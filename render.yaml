# Render blueprint for the ShotSense ML inference service.
# The Next.js frontend deploys to Vercel (see README); this hosts the Python
# pose/ML service that Vercel serverless can't run.
#
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo.
# Then set ML_INFERENCE_URL on Vercel to https://<this-service>.onrender.com/predict
services:
  - type: web
    name: shotsense-ml
    runtime: docker
    rootDir: ml-service
    dockerfilePath: ./Dockerfile
    plan: free # 512MB RAM — upgrade to "starter" if the pose model OOMs under load
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
